[pytest]
testpaths = tests
asyncio_mode = auto
addopts = -q
# The docker tier stages the real upstreams (whose own test suites import homeassistant,
# absent in that tier's minimal env) under tests/docker/{upstream_src,custom_components}.
# Never recurse into those staged trees when collecting our tests.
norecursedirs = upstream_src custom_components node_modules .* build dist *.egg
